name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Grant execute permission for gradlew
        run: chmod +x apps/android/gradlew
        working-directory: ./
      
      - name: Run unit tests
        run: ./gradlew testDevDebugUnitTest
        working-directory: apps/android
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: apps/android/app/build/reports/tests/testDevDebugUnitTest/
      
      - name: Upload test HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: apps/android/app/build/reports/tests/testDevDebugUnitTest/

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Grant execute permission for gradlew
        run: chmod +x apps/android/gradlew
        working-directory: ./
      
      - name: Run lint
        run: ./gradlew lint
        working-directory: apps/android
        continue-on-error: true
      
      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: apps/android/app/build/reports/lint-results-*.html
      
      - name: Upload lint XML
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-xml
          path: apps/android/app/build/reports/lint-results-*.xml

  ktlint:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Grant execute permission for gradlew
        run: chmod +x apps/android/gradlew
        working-directory: ./
      
      - name: Run ktlint check
        run: ./gradlew ktlintCheck
        working-directory: apps/android
        continue-on-error: true
