    <g transform="translate(54, 54) scale(0.92) translate(-54, -54)">
        <!-- Camera Island (Green) -->
        <rect x="24" y="24" width="60" height="60" rx="18" fill="#1B8A5D" />
        
        <!-- Lens Ring (White Cutout) -->
        <circle cx="54" cy="54" r="18" fill="none" stroke="#FFFFFF" stroke-width="6" />
        
